name: Backend CI

on:
  push:
    branches: [ "main" ]
    paths:
      - 'apps/api/**'
      - '.github/workflows/backend.yml'
  pull_request:
    branches: [ "main" ]
    paths:
      - 'apps/api/**'
      - '.github/workflows/backend.yml'

jobs:
  test:
    name: Backend Unit Tests
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
        
      - name: Install pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9
          
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'
          
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
        
      - name: Run backend tests
        run: pnpm -C apps/api test:coverage
        
      - name: SonarCloud Scan
        uses: SonarSource/sonarqube-scan-action@master
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          args: >
            -Dsonar.projectKey=agussantinelli_GitData
            -Dsonar.organization=agussantinelli
            -Dsonar.sources=apps/web/src,apps/api/src
            -Dsonar.exclusions=**/tests/**,**/*.test.tsx,**/*.test.ts,**/node_modules/**,**/dist/**,**/build/**
            -Dsonar.javascript.lcov.reportPaths=apps/web/coverage/lcov.info,apps/api/coverage/lcov.info
            -Dsonar.tests=apps/web/src,apps/api/src
            -Dsonar.test.inclusions=**/*.test.tsx,**/*.test.ts
